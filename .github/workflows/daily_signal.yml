name: Daily Signal Run

on:
  schedule:
    - cron: '0 11 * * 1-5'  # 평일 KST 20:00 (UTC 11:00)
  workflow_dispatch:  # 수동 트리거

jobs:
  run-signal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run signal
        env:
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python signal_runner.py
      - name: Commit results
        run: |
          git config user.email "stanleyim@gmail.com"
          git config user.name "stanleyim"
          git add data/ output/
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto: signal $(date -u +%Y-%m-%d)"
          git push
